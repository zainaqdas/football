<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Mesh gradient overlay -->
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0070f3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#7928ca" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  
  <!-- Decorative football pattern -->
  <circle cx="150" cy="120" r="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="80" fill="none"/>
  <circle cx="1050" cy="500" r="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="60" fill="none"/>
  
  <!-- Football icon -->
  <g transform="translate(180, 200)">
    <circle cx="60" cy="60" r="55" stroke="white" stroke-width="3"/>
    <ellipse cx="60" cy="60" rx="27" ry="55" stroke="white" stroke-width="2"/>
    <ellipse cx="60" cy="60" rx="55" ry="27" stroke="white" stroke-width="2"/>
    <polygon points="60,38 76.5,50 72,67 48,67 43.5,50" stroke="white" stroke-width="1.5" fill="none"/>
    <line x1="60" y1="38" x2="60" y2="8" stroke="white" stroke-width="1.5"/>
    <line x1="76.5" y1="50" x2="102" y2="38" stroke="white" stroke-width="1.5"/>
    <line x1="72" y1="67" x2="90" y2="88" stroke="white" stroke-width="1.5"/>
    <line x1="48" y1="67" x2="30" y2="88" stroke="white" stroke-width="1.5"/>
    <line x1="43.5" y1="50" x2="18" y2="38" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Main text -->
  <text x="360" y="250" font-family="Inter, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white" letter-spacing="-3">Gol HD</text>
  
  <!-- Tagline -->
  <text x="360" y="310" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="-0.5">Live sports channels &amp; matches in HD</text>
  
  <!-- Bottom bar -->
  <rect x="360" y="340" width="80" height="4" rx="2" fill="#0070f3"/>
  
  <!-- Live badge -->
  <rect x="360" y="370" width="100" height="32" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="380" cy="386" r="5" fill="#22c55e"/>
  <text x="392" y="391" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.8)">LIVE</text>
  
  <!-- URL -->
  <text x="580" y="435" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.35)">golhd.tv</text>
</svg>
