<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="280" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="60" fill="none"/>
  <circle cx="1050" cy="500" r="200" stroke="#8b5cf6" stroke-opacity="0.04" stroke-width="50" fill="none"/>
  
  <!-- Football icon -->
  <g transform="translate(170, 195)">
    <circle cx="65" cy="65" r="62" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.3" fill="none"/>
    <circle cx="65" cy="65" r="60" stroke="white" stroke-width="3" fill="none"/>
    <polygon points="65,38 76.5,50 72,72 58,72 53.5,50" fill="white" stroke="none"/>
    <ellipse cx="65" cy="65" rx="30" ry="60" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
    <ellipse cx="65" cy="65" rx="60" ry="30" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
    <line x1="65" y1="38" x2="65" y2="8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="76.5" y1="50" x2="105" y2="38" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="72" y1="72" x2="95" y2="95" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="58" y1="72" x2="35" y2="95" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="53.5" y1="50" x2="25" y2="38" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Glow accent line -->
  <rect x="360" y="165" width="120" height="4" rx="2" fill="url(#glowGrad)"/>
  
  <!-- Main title -->
  <text x="360" y="240" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" fill="white" letter-spacing="-3">Gol HD</text>
  
  <!-- Tagline -->
  <text x="360" y="300" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#a1a1aa" letter-spacing="-0.3">Live Sports Channels &amp; Matches in HD</text>
  
  <!-- Features -->
  <g transform="translate(360, 340)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="18" cy="14" r="5" fill="#22c55e"/>
    <text x="30" y="18" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">LIVE</text>
    
    <rect x="115" y="0" width="140" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="130" y="18" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">100+ CHANNELS</text>
    
    <rect x="270" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="285" y="18" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">HD QUALITY</text>
  </g>
  
  <!-- URL at bottom -->
  <text x="360" y="440" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#52525b">golhd.tv</text>
</svg>
