<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="golGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="hdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Football icon with gradient stroke -->
  <g transform="translate(4, 6)">
    <!-- Outer glow -->
    <circle cx="20" cy="20" r="19" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.2" filter="url(#glow)"/>
    <!-- Outer circle -->
    <circle cx="20" cy="20" r="18" stroke="url(#golGrad)" stroke-width="2.5" fill="none"/>
    <!-- Pentagon center with fill -->
    <polygon points="20,11 26.5,15.5 23.5,23 16.5,23 13.5,15.5" fill="url(#golGrad)" stroke="none"/>
    <!-- Center lines -->
    <ellipse cx="20" cy="20" rx="9" ry="18" stroke="url(#golGrad)" stroke-width="1.2" fill="none" opacity="0.6"/>
    <ellipse cx="20" cy="20" rx="18" ry="9" stroke="url(#golGrad)" stroke-width="1.2" fill="none" opacity="0.6"/>
    <!-- Pentagon lines -->
    <line x1="20" y1="11" x2="20" y2="3" stroke="url(#golGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="26.5" y1="15.5" x2="35" y2="11" stroke="url(#golGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="23.5" y1="23" x2="32" y2="31" stroke="url(#golGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="16.5" y1="23" x2="8" y2="31" stroke="url(#golGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="13.5" y1="15.5" x2="5" y2="11" stroke="url(#golGrad)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Gol text -->
  <text x="54" y="33" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.8">Gol</text>

  <!-- HD highlight box -->
  <rect x="94" y="11" width="38" height="26" rx="4" fill="url(#hdGrad)" opacity="0.15"/>
  <text x="96" y="32" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="url(#hdGrad)" letter-spacing="1.5">HD</text>

  <!-- Tagline -->
  <text x="140" y="32" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#71717a" letter-spacing="2" opacity="0.7">LIVE SPORTS</text>
</svg>
