<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="golGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="hdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Football icon -->
  <g transform="translate(2, 4)">
    <!-- Outer glow ring -->
    <circle cx="28" cy="28" r="26" stroke="#3b82f6" stroke-width="3.5" fill="none" opacity="0.2" filter="url(#glow)"/>
    <!-- Outer circle -->
    <circle cx="28" cy="28" r="25" stroke="url(#golGrad)" stroke-width="3" fill="none"/>
    <!-- Pentagon center -->
    <polygon points="28,13 37,19.5 33,29.5 23,29.5 19,19.5" fill="url(#golGrad)" stroke="none"/>
    <!-- Stitch lines -->
    <ellipse cx="28" cy="28" rx="13" ry="25" stroke="url(#golGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <ellipse cx="28" cy="28" rx="25" ry="13" stroke="url(#golGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <line x1="28" y1="13" x2="28" y2="0" stroke="url(#golGrad)" stroke-width="1.2" opacity="0.5"/>
    <line x1="37" y1="19.5" x2="50" y2="13" stroke="url(#golGrad)" stroke-width="1.2" opacity="0.5"/>
    <line x1="33" y1="29.5" x2="44" y2="42" stroke="url(#golGrad)" stroke-width="1.2" opacity="0.5"/>
    <line x1="23" y1="29.5" x2="12" y2="42" stroke="url(#golGrad)" stroke-width="1.2" opacity="0.5"/>
    <line x1="19" y1="19.5" x2="6" y2="13" stroke="url(#golGrad)" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- "Gol" text -->
  <text x="70" y="40" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Gol</text>

  <!-- "HD" pill badge -->
  <rect x="118" y="14" width="46" height="32" rx="6" fill="url(#hdGrad)" opacity="0.15"/>
  <rect x="118" y="14" width="46" height="32" rx="6" stroke="url(#hdGrad)" stroke-width="1" opacity="0.4" fill="none"/>
  <text x="121" y="38" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#hdGrad)" letter-spacing="2">HD</text>

  <!-- Tagline -->
  <text x="174" y="38" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#71717a" letter-spacing="2.5" opacity="0.7">LIVE SPORTS</text>
</svg>
